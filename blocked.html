<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Blocked by Schedule</title>
    <link rel="stylesheet" href="blocked.css">
  </head>
  <body>
    <main class="blocked-shell">
      <section class="blocked-panel" aria-labelledby="blocked-title">
        <p class="eyebrow">Scheduled Website Blocker</p>
        <h1 id="blocked-title">This website is blocked right now.</h1>
        <p class="message">
          The current time is inside one of its blocked slots.
        </p>
        <section id="extra-time" class="extra-time" hidden>
          <p id="extra-status">Checking today&apos;s allowance...</p>
          <div id="extra-actions" class="extra-actions" hidden>
            <button type="button" data-extra-minutes="5">Add 5 min</button>
            <button type="button" data-extra-minutes="15">Add 15 min</button>
            <button type="button" data-extra-minutes="30">Add 30 min</button>
          </div>
        </section>
        <div class="actions">
          <button id="continue-site" type="button" hidden>Continue</button>
          <button id="go-back" type="button">Go back</button>
        </div>
      </section>
    </main>
    <script src="blocked.js"></script>
  </body>
</html>
